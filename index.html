<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原子习惯追踪器</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Toast Notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <span class="logo-icon">⚛️</span>
        <span class="logo-text">原子习惯</span>
      </div>
      <div class="header-actions">
        <div class="score-display">
          <span id="dailyScore">0</span> / <span id="totalHabits">0</span>
          <span class="score-stars" id="scoreStars"></span>
        </div>
        <button class="btn btn-primary btn-sm" id="addHabitBtnTop">+ 添加习惯</button>
      </div>
    </div>
  </header>

  <!-- HERO TIP (Collapsible) -->
  <section class="hero-tip" id="heroTipSection">
    <div class="container">
      <button class="hero-tip__toggle" id="heroTipToggle">
        💡 为什么先做最小行动？
        <span class="toggle-arrow" id="heroTipArrow">▼</span>
      </button>
      <div class="hero-tip__body" id="heroTipBody" style="display:none">
        <p>每天 1% 的小进步，比偶尔爆发更可靠。</p>
        <p class="cite">— James Clear《原子习惯》</p>
      </div>
    </div>
  </section>

  <!-- TODAY HABITS (First Screen) -->
  <section class="section section-today" id="todayHabitsSection">
    <div class="container">
      <div class="section-header">
        <h2>今天要做 <span id="todayCount"></span></h2>
        <button class="btn btn-primary btn-sm" id="addHabitBtnTop2">+ 添加习惯</button>
      </div>
      <div id="habitsContainer"><!-- 习惯列表 --></div>
    </div>
  </section>

  <!-- SCORECARD Moved to top header -->



  <!-- Modals -->
  <!-- Add Habit Modal -->
  <div class="modal" id="habitModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3>添加新习惯</h3>
        <button class="btn-icon modal-close">&times;</button>
      </div>
      <div class="habit-tip-box">
        <span class="habit-tip-icon">💡</span>
        <span class="habit-tip-text" id="habitTipText">先写'什么时候开始'，再写'做到什么算完成'，这样最容易坚持。</span>
      </div>
      <form id="habitForm">
        <!-- Basic fields: always visible -->
        <div class="form-group form-group--name">
          <label for="habitName">习惯名称</label>
          <input type="text" id="habitName" placeholder="例如：晨跑、读书、冥想" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="habitTarget">目标频率</label>
            <select id="habitTarget">
              <option value="7">每天</option>
              <option value="5">每周5次</option>
              <option value="3">每周3次</option>
              <option value="1">每周1次</option>
              <option value="custom">自定义</option>
            </select>
          </div>
        </div>
        <!-- Custom frequency input (shown when 自定义 selected) -->
        <div class="form-group custom-freq-group" id="customFreqGroup" style="display:none">
          <label for="customFreqInput">自定义频率</label>
          <input type="text" id="customFreqInput" placeholder="例如：每周4次，或 指定周一/三/五">
        </div>
        <div class="form-group">
          <label for="habitCue">提示（什么时候开始）</label>
          <div class="preset-chips" id="cueChips">
            <button type="button" class="chip" data-val="起床后">起床后</button>
            <button type="button" class="chip" data-val="洗漱后">洗漱后</button>
            <button type="button" class="chip" data-val="早餐后">早餐后</button>
            <button type="button" class="chip" data-val="下班后">下班后</button>
            <button type="button" class="chip" data-val="睡前">睡前</button>
          </div>
          <input type="text" id="habitCue" placeholder="例如：洗漱完后 / 坐到书桌前 / 晚饭后">
        </div>
        <div class="form-group">
          <label for="habitTinyAction">最小行动 <span class="label-sub">做到什么程度就算完成</span></label>
          <div class="preset-chips" id="tinyActionChips">
            <button type="button" class="chip" data-val="读1页">读1页</button>
            <button type="button" class="chip" data-val="写1句话">写1句话</button>
            <button type="button" class="chip" data-val="做1个俯卧撑">做1个俯卧撑</button>
            <button type="button" class="chip" data-val="走5分钟">走5分钟</button>
          </div>
          <input type="text" id="habitTinyAction" placeholder="例如：阅读2页 / 写1句话 / 走路5分钟">
        </div>

        <!-- Habit preview sentence -->
        <div class="habit-preview" id="habitPreview">
          <div class="habit-preview__icon">⚛️</div>
          <div class="habit-preview__text" id="habitPreviewText"></div>
        </div>

        <!-- Advanced toggle -->
        <button type="button" class="advanced-toggle" id="advancedToggle">
          <span id="advancedToggleText">展开高级设置</span>
          <span class="advanced-toggle__arrow" id="advancedToggleArrow">▼</span>
        </button>

        <!-- Advanced fields: hidden by default -->
        <div class="advanced-section" id="advancedSection">
          <div class="form-group">
            <label for="habitIdentitySelect">这条习惯服务于哪个身份？</label>
            <select id="habitIdentitySelect">
              <option value="">— 不关联身份 —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="habitStackSelect">这条习惯挂靠在哪个旧习惯后面？</label>
            <select id="habitStackSelect">
              <option value="">— 不关联堆叠 —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="habitMotivation">我为什么想做这件事</label>
            <input type="text" id="habitMotivation" placeholder="例如：我想更平静 / 想每天有进步感 / 想减少拖延">
          </div>
          <div class="form-group">
            <label for="habitInstantReward">即时奖励（完成后立刻感受到什么）</label>
            <input type="text" id="habitInstantReward" placeholder="例如：打个勾很有成就感 / 感觉今天没白过 / 放松一下">
          </div>
          <div class="form-group">
            <label for="habitDesc">描述 / 备注</label>
            <textarea id="habitDesc" placeholder="补充说明（可选）" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>颜色</label>
            <div class="color-picker" id="colorPicker">
              <span class="color-dot active" data-color="#f97316" style="background:#f97316"></span>
              <span class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></span>
              <span class="color-dot" data-color="#10b981" style="background:#10b981"></span>
              <span class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></span>
              <span class="color-dot" data-color="#ec4899" style="background:#ec4899"></span>
              <span class="color-dot" data-color="#06b6d4" style="background:#06b6d4"></span>
              <span class="color-dot" data-color="#eab308" style="background:#eab308"></span>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary modal-close">取消</button>
          <button type="submit" class="btn btn-primary">添加习惯</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Identity Modal -->
  <div class="modal" id="identityModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3>添加身份习惯</h3>
        <button class="btn-icon modal-close">&times;</button>
      </div>
      <form id="identityForm">
        <div class="form-group">
          <label>身份宣言</label>
          <input type="text" id="identityText" placeholder='例如："我是一名跑者"' required>
        </div>
        <div class="form-group">
          <label>为什么这对你很重要？</label>
          <textarea id="identityWhy" placeholder="理由……" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary modal-close">取消</button>
          <button type="submit" class="btn btn-primary">添加身份</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Stack Modal -->
  <div class="modal" id="stackModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3>添加习惯堆叠</h3>
        <button class="btn-icon modal-close">&times;</button>
      </div>
      <form id="stackForm">
        <div class="form-group">
          <label>锚点（我已经做的事）</label>
          <input type="text" id="stackAnchor" placeholder="例如：在我倒完早咖啡之后" required>
        </div>
        <div class="form-group">
          <label>新习惯（我要做的事）</label>
          <input type="text" id="stackNew" placeholder="例如：我将写日记" required>
        </div>
        <div class="form-group">
          <label>关联习惯 <span class="label-sub">将此堆叠关联到哪个习惯</span></label>
          <select id="stackHabitId">
            <option value="">（不关联）</option>
          </select>
        </div>
        <div class="form-group">
          <label>关联身份 <span class="label-sub">将此堆叠关联到哪个身份</span></label>
          <select id="stackIdentityId">
            <option value="">（不关联）</option>
          </select>
        </div>
        <div class="form-group">
          <label>小提示（可选）</label>
          <input type="text" id="stackCue" placeholder="例如：把笔放在咖啡机旁边">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary modal-close">取消</button>
          <button type="submit" class="btn btn-primary">添加堆叠</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Habit Loop Modal (used for both edit and inline expand) -->
  <div class="modal" id="loopModal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="loopModalTitle">编辑习惯循环</h3>
        <button class="btn-icon modal-close">&times;</button>
      </div>
      <form id="loopForm">
        <input type="hidden" id="loopHabitId">
        <div class="form-group">
          <label>提示（触发）</label>
          <input type="text" id="loopCue" placeholder="什么触发了这个习惯？">
        </div>
        <div class="form-group">
          <label>渴望（动机）</label>
          <input type="text" id="loopCraving" placeholder="你渴望什么？">
        </div>
        <div class="form-group">
          <label>反应（行动）</label>
          <input type="text" id="loopResponse" placeholder="你实际上做什么？">
        </div>
        <div class="form-group">
          <label>即时奖励（完成后立刻感受到什么）</label>
          <input type="text" id="loopReward" placeholder="你得到什么益处？">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary modal-close">取消</button>
          <button type="submit" class="btn btn-primary">保存循环</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
